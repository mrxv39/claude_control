<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bar">
  <span class="logo">Sessions</span>
  <div class="chips" id="chips"></div>
  <span class="stats" id="stats"></span>
  <span id="idle-indicator" style="display:none;font-size:10px;color:#bb9af7;background:rgba(187,154,247,.15);padding:2px 6px;border-radius:3px;flex-shrink:0;-webkit-app-region:no-drag;" title="Ejecutando tareas automáticas"></span>
  <span id="avg-indicator" style="display:none;font-size:10px;padding:2px 6px;border-radius:3px;flex-shrink:0;-webkit-app-region:no-drag;cursor:pointer;" title="Media de uso de tokens (7d) — click para ver detalle">AVG ?%</span>
  <button class="bar-btn minimize-all" id="minimize-all-btn" title="Minimizar todas las consolas" aria-label="Minimizar todas las consolas">&#9644;</button>
  <button class="bar-btn gear" id="gear-btn" title="Panel del orquestador" aria-label="Abrir panel del orquestador">&#9881;</button>
  <button class="bar-btn close" id="close-btn" aria-label="Ocultar barra">✕</button>
</div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-tabs" role="tablist">
      <button class="panel-tab active" data-tab="health" role="tab" aria-selected="true">Salud</button>
      <button class="panel-tab" data-tab="queue" role="tab" aria-selected="false">Cola</button>
      <button class="panel-tab" data-tab="log" role="tab" aria-selected="false">Log</button>
      <button class="panel-tab" data-tab="stats" role="tab" aria-selected="false">Stats</button>
      <button class="panel-tab" data-tab="auto" role="tab" aria-selected="false">Autónomo</button>
    </div>
    <span class="panel-budget" id="budget-display"></span>
    <button class="panel-close" id="panel-close-btn" aria-label="Cerrar panel">Cerrar</button>
  </div>
  <div class="panel-content" id="panel-content" role="tabpanel"></div>
</div>
<script>
const { ipcRenderer } = require('electron');
// Same index.html serves two windows: the always-on-top bar (default) and the
// orchestrator panel (loaded with hash '#panel'). The flag below gates the
// init paths so each window only runs the JS it needs.
const isPanel = window.location.hash === '#panel';
if (isPanel) document.body.classList.add('panel-mode');
const chips = document.getElementById('chips');
const stats = document.getElementById('stats');

const selected = new Set(); // hwnd values
const gitCache = {}; // cwd -> { branch, dirty, recentCommits }
const gitCacheTime = {}; // cwd -> timestamp of last fetch
const GIT_CACHE_TTL = 30000; // 30s between git status refreshes per cwd

function esc(str) { return String(str || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

const COLORS = {
  green: '#9ece6a', yellow: '#e0af68', red: '#f7768e', blue: '#7aa2f7', purple: '#bb9af7', dim: '#565f89',
  priority: { high: '#9ece6a', medium: '#e0af68', low: '#7aa2f7', ignored: '#565f89' },
  pacing: { pace: '#9ece6a', accelerate: '#7aa2f7', burst: '#e0af68', coast: '#f7768e', wait: '#565f89' },
};
function rateColor(pct) { return pct < 50 ? COLORS.green : pct < 80 ? COLORS.yellow : COLORS.red; }

function render(sessions) {
  chips.innerHTML = '';
  if (!sessions.length) { chips.innerHTML = '<span class="run">No sessions</span>'; stats.textContent = ''; return; }

  // Group sessions by cwd
  const groups = new Map();
  for (const s of sessions) {
    const key = (s.cwd && s.cwd !== 'N/A') ? s.cwd.toLowerCase() : `_pid_${s.pid}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(s);
  }

  // Merge each group into a single display item
  const order = {BUSY:0, WAITING:1, IDLE:2};
  const items = [];
  for (const [, group] of groups) {
    const claude = group.filter(s => s.isClaude);
    const nonClaude = group.filter(s => !s.isClaude);
    let primary;
    if (claude.length > 0) {
      claude.sort((a,b) => (order[a.status]||2) - (order[b.status]||2));
      primary = claude[0];
    } else {
      primary = group[0];
    }
    const primaryHwnd = primary.hwnd || 0;
    const services = nonClaude.map(s => ({
      label: (s.running && s.running !== '-') ? s.running : (s.shell || '?'),
      hwnd: s.hwnd || primaryHwnd,  // fallback to Claude session's HWND
      tabIndex: s.tabIndex
    })).filter(sv => sv.label);
    items.push({ ...primary, services });
  }
  items.sort((a,b) => (order[a.status]||2) - (order[b.status]||2));

  // Drop stale hwnds from selection
  const live = new Set(items.map(s => s.hwnd).filter(Boolean));
  for (const h of [...selected]) if (!live.has(h)) selected.delete(h);

  let b=0, w=0, i=0;
  items.forEach(s => {
    if (s.status==='BUSY') b++; else if (s.status==='WAITING') w++; else i++;
    const d = document.createElement('div');
    d.className = 'chip ' + s.status.toLowerCase();
    d.setAttribute('tabindex', '0');
    d.setAttribute('role', 'button');
    if (s.hwnd && selected.has(s.hwnd)) d.classList.add('selected');
    const ctx = s.contextPercent || 0;
    d.title = `${s.project}\n${s.cwd || ''}\nEstado: ${s.status}\nContexto: ${ctx}%\nPID: ${s.pid}`;
    const run = s.running !== '-' ? ` <span class="run">[${esc(s.running)}]</span>` : '';

    // Build main row (branch + context % shown in WT overlay titles, not in chips)
    const mainDiv = document.createElement('div');
    mainDiv.className = 'chip-main';
    // Note: innerHTML is safe — all dynamic values go through esc() (HTML entity escaping).
    // This is a local Electron app with no remote content.
    mainDiv.innerHTML = `<span class="dot"></span><span class="name">${esc(s.project)}</span>${run}`;
    d.appendChild(mainDiv);

    // Context bar removed — context % now shown in WT overlay titles

    // Build service row with clickable badges
    if (s.services.length) {
      const svcDiv = document.createElement('div');
      svcDiv.className = 'chip-svc';
      s.services.forEach(sv => {
        const badge = document.createElement('span');
        badge.className = 'svc';
        badge.textContent = '\u2699 ' + sv.label;
        badge.addEventListener('click', (ev) => {
          ev.stopPropagation();
          selected.clear();
          ipcRenderer.invoke('focus-wt', { hwnd: sv.hwnd, tabIndex: sv.tabIndex });
          try { ipcRenderer.invoke('track', 'session_focus', {}); } catch {}
          refresh();
        });
        svcDiv.appendChild(badge);
      });
      d.appendChild(svcDiv);
    }

    // Main chip click: focus Claude session
    d.addEventListener('click', (ev) => {
      if ((ev.ctrlKey || ev.metaKey) && s.hwnd) {
        if (selected.has(s.hwnd)) selected.delete(s.hwnd);
        else selected.add(s.hwnd);
        if (selected.size >= 2) {
          ipcRenderer.invoke('tile-windows', [...selected]);
        }
        refresh();
        return;
      }
      selected.clear();
      ipcRenderer.invoke('focus-wt', { hwnd: s.hwnd, tabIndex: s.tabIndex });
      try { ipcRenderer.invoke('track', 'session_focus', {}); } catch {}
      refresh();
    });
    d.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter' || ev.key === ' ') {
        ev.preventDefault();
        d.click();
      }
    });
    chips.appendChild(d);
  });
  const total = sessions.length;
  stats.textContent = `${total}T ${b}● ${w}◉ ${i}○` + (selected.size ? ` · ${selected.size} sel` : '');
  // Debounced resize to avoid jank
  clearTimeout(render._resizeTimer);
  render._resizeTimer = setTimeout(() => {
    const bar = document.querySelector('.bar');
    if (bar) {
      const w = bar.scrollWidth + 4;
      if (w !== render._lastWidth) { render._lastWidth = w; ipcRenderer.invoke('resize-bar', w); }
    }
  }, 100);
}

async function refresh() {
  const sessions = await ipcRenderer.invoke('get-sessions');
  // Update git cache in background, throttled per cwd
  const now = Date.now();
  const cwds = new Set(sessions.filter(s => s.cwd && s.cwd !== 'N/A').map(s => s.cwd));
  for (const cwd of cwds) {
    if (!gitCache[cwd]) gitCache[cwd] = { branch: null, dirty: 0, recentCommits: [] };
    if (!gitCacheTime[cwd] || now - gitCacheTime[cwd] > GIT_CACHE_TTL) {
      gitCacheTime[cwd] = now;
      ipcRenderer.invoke('get-git-status', cwd).then(git => {
        if (git) gitCache[cwd] = git;
      }).catch(() => {});
    }
  }
  render(sessions);
  // Update status indicator (idle / capacity / auto)
  try {
    const sched = await ipcRenderer.invoke('get-scheduler-status');
    const ind = document.getElementById('idle-indicator');
    if (sched.rateLimits) {
      const pct = Math.round(sched.rateLimits.fiveHour.usedPercent);
      const p = sched.pacingDecision;
      const color = rateColor(pct);
      let label = `5h:${pct}%`;
      if (p && p.targetUsage !== undefined) label += `→${Math.round(p.targetUsage)}%`;
      if (p && p.action === 'burst') label += ' BURST';
      else if (p && p.action === 'coast') label += ' coast';
      if (sched.running) {
        const modeTag = { 'off-hours': 'AUTO', 'idle': 'IDLE', 'capacity': 'CAP' }[sched.currentMode] || 'AUTO';
        label += ' ' + modeTag;
      }
      ind.textContent = label;
      ind.style.display = '';
      ind.style.color = color;
      ind.style.background = color + '22';
    } else if (sched.running) {
      const modeLabels = { 'off-hours': 'AUTO', 'idle': 'AUTO-IDLE', 'capacity': 'AUTO-CAP' };
      ind.textContent = modeLabels[sched.currentMode] || 'AUTO';
      ind.style.display = '';
      ind.style.color = '#bb9af7';
      ind.style.background = 'rgba(187,154,247,.15)';
    } else if (sched.userIsIdle && sched.idleEnabled && !sched.paused) {
      ind.textContent = `idle ${sched.userIdleFor}m`;
      ind.style.display = '';
      ind.style.color = '#565f89';
      ind.style.background = 'rgba(255,255,255,.05)';
    } else {
      ind.style.display = 'none';
    }
  } catch {}
  // AVG % token usage (7d rolling, updated on each refresh — cheap read)
  try {
    const avg = await ipcRenderer.invoke('auto:token-avg', 7);
    const el = document.getElementById('avg-indicator');
    if (!el) return;
    if (!avg || avg.status === 'no-data' || avg.count === 0) {
      el.style.display = 'none';
      return;
    }
    const pct = avg.avg;
    const color = pct >= 90 ? '#9ece6a' : pct >= 70 ? '#e0af68' : '#f7768e';
    el.textContent = `AVG ${pct}%`;
    el.style.color = color;
    el.style.background = color + '22';
    el.style.display = '';
  } catch {}
}
// Bar-only: poll sessions every 3s. Panel window doesn't need chips.
if (!isPanel) {
  refresh();
  setInterval(refresh, 3000);
}

// AVG indicator click → open panel on Tokens tab (wired when that tab exists;
// for now just opens the panel).
document.addEventListener('click', (e) => {
  if (e.target && e.target.id === 'avg-indicator') {
    ipcRenderer.invoke('toggle-panel');
  }
});

// Show update chip if available
ipcRenderer.on('update-available', (ev, version, url) => {
  let upd = document.getElementById('update-chip');
  if (upd) return;
  upd = document.createElement('div');
  upd.id = 'update-chip';
  upd.className = 'chip update';
  const mainDiv = document.createElement('div');
  mainDiv.className = 'chip-main';
  const nameSpan = document.createElement('span');
  nameSpan.className = 'name';
  nameSpan.style.color = '#e0af68';
  nameSpan.textContent = 'Update ' + version;
  mainDiv.appendChild(nameSpan);
  upd.appendChild(mainDiv);
  upd.title = 'Click para descargar la nueva version';
  upd.addEventListener('click', () => { if (url && url.startsWith('https://github.com/')) require('electron').shell.openExternal(url); });
  document.querySelector('.chips').prepend(upd);
});

// ---- Orchestrator panel ----
const gearBtn = document.getElementById('gear-btn');
const panel = document.getElementById('panel');
const panelContent = document.getElementById('panel-content');
const budgetDisplay = document.getElementById('budget-display');
let currentTab = 'health';

async function togglePanel() {
  if (isPanel) {
    // We're in the panel window — closing the IPC destroys this window.
    await ipcRenderer.invoke('toggle-panel');
    return;
  }
  const isOpen = await ipcRenderer.invoke('toggle-panel');
  gearBtn.classList.toggle('active', isOpen);
  try { ipcRenderer.invoke('track', 'panel_toggle', { open: !!isOpen }); } catch {}
}
if (gearBtn) gearBtn.addEventListener('click', togglePanel);
document.getElementById('panel-close-btn').addEventListener('click', togglePanel);
if (!isPanel) {
  document.getElementById('close-btn').addEventListener('click', () => {
    ipcRenderer.invoke('hide-bar');
  });
}
// Bar window: keep the gear's "active" state in sync when the panel window
// is closed externally (taskbar, Alt+F4, etc.).
ipcRenderer.on('panel-closed', () => {
  if (gearBtn) gearBtn.classList.remove('active');
});
// Panel window: load the initial tab content as soon as the DOM is ready.
if (isPanel) {
  // Mark gear as null-safe in panel mode (no gear button rendered).
  loadTab('health');
}
const minBtn = document.getElementById('minimize-all-btn');
let minimizedHwnds = [];
minBtn.addEventListener('click', async () => {
  if (minimizedHwnds.length > 0) {
    await ipcRenderer.invoke('restore-wt', minimizedHwnds);
    minimizedHwnds = [];
    minBtn.textContent = '\u2584';
    minBtn.title = 'Minimizar todas las consolas';
  } else {
    minimizedHwnds = await ipcRenderer.invoke('minimize-all-wt');
    if (minimizedHwnds.length > 0) {
      minBtn.textContent = '\u25FB';
      minBtn.title = 'Restaurar consolas minimizadas';
    }
  }
});

document.querySelectorAll('.panel-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.panel-tab').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    currentTab = btn.dataset.tab;
    loadTab(currentTab);
    try { ipcRenderer.invoke('track', 'panel_tab_view', { tab: currentTab }); } catch {}
  });
});

async function loadTab(tab) {
  // Update budget display
  try {
    const budget = await ipcRenderer.invoke('get-budget-status');
    budgetDisplay.textContent = `$${budget.todaySpent.toFixed(2)} / $${budget.dailyBudget.toFixed(2)}`;
  } catch {}

  if (tab === 'health') await renderHealth();
  else if (tab === 'queue') await renderQueue();
  else if (tab === 'log') await renderLog();
  else if (tab === 'stats') await renderStats();
  else if (tab === 'auto') await renderAuto();
}

// ---- Tab Autónomo (sistema nuevo F1+) — DOM-API only, sin innerHTML ----

const AUTO_TEMPLATES = [
  { name: 'production-ready', label: 'Production-ready' },
  { name: 'MVP-lanzable', label: 'MVP lanzable' },
  { name: 'mantenimiento', label: 'Mantenimiento' },
  { name: 'explorar-idea', label: 'Explorar idea' },
  { name: 'seguro-y-testeado', label: 'Seguro y testeado' },
];

// Colores por stack (Tokyo Night palette coherente con el resto de la UI)
const STACK_COLORS = {
  'node': '#9ece6a',
  'python': '#e0af68',
  'tauri+rust': '#ff9e64',
  'electron': '#7aa2f7',
  'python+node': '#bb9af7',
  'rust': '#ff9e64',
  'unknown': '#565f89',
};
function stackColor(stack) { return STACK_COLORS[stack] || '#565f89'; }
function scoreColor(score) {
  const n = typeof score === 'number' ? score : 0;
  if (n >= 7) return '#9ece6a';
  if (n >= 4) return '#e0af68';
  return '#f7768e';
}

// Filtro en memoria para la búsqueda
let autoSearchQuery = '';

function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
      else if (k === 'class') node.className = v;
      else if (k === 'dataset' && typeof v === 'object') Object.assign(node.dataset, v);
      else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
      else if (k === 'text') node.textContent = v;
      else if (v != null) node.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  }
  return node;
}

function autoProjectRow(name, p, active) {
  const tpl = p.objective?.template || '';
  const score = p.analysis?.score ?? p.score ?? null;
  const stack = p.stack || 'unknown';
  const sColor = stackColor(stack);
  const scColor = score != null ? scoreColor(score) : '#565f89';

  const row = el('div', {
    class: 'auto-row' + (active ? ' auto-row-active' : ''),
    dataset: { project: name },
    style: {
      display: 'grid',
      gridTemplateColumns: '28px 1fr auto auto',
      alignItems: 'center',
      gap: '10px',
      padding: '8px 12px',
      borderLeft: `3px solid ${active ? '#9ece6a' : 'transparent'}`,
      background: active ? 'rgba(158,206,106,.06)' : 'transparent',
      fontSize: '12px',
      transition: 'background 120ms',
    },
  });

  // Toggle pill-style (más visible que un punto)
  const toggle = el('button', {
    class: 'auto-toggle',
    title: active ? 'Pausar este proyecto' : 'Activar este proyecto',
    style: {
      width: '24px', height: '16px', borderRadius: '8px', border: 'none', padding: '0',
      background: active ? '#9ece6a' : 'rgba(255,255,255,.1)',
      position: 'relative', cursor: 'pointer', transition: 'background 150ms',
      flexShrink: '0',
    },
    onclick: async (ev) => {
      ev.stopPropagation();
      await ipcRenderer.invoke('auto:toggle-active', name, !active);
      renderAuto();
    },
  });
  toggle.appendChild(el('span', {
    style: {
      position: 'absolute', top: '2px', left: active ? '10px' : '2px',
      width: '12px', height: '12px', borderRadius: '6px',
      background: active ? '#1a1b26' : '#565f89',
      transition: 'left 150ms',
    },
  }));

  // Nombre + stack badge — nombre clickable para abrir drawer
  const labelCol = el('div', { style: { minWidth: '0', display: 'flex', alignItems: 'center', gap: '8px' } });
  const nameBtn = el('span', {
    style: {
      overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
      color: active ? '#c0caf5' : '#a9b1d6', fontWeight: active ? '500' : '400',
      cursor: 'pointer', textDecoration: 'none',
    },
    title: 'Ver detalle del proyecto',
    text: name,
    onclick: () => openProjectDrawer(name),
  });
  nameBtn.addEventListener('mouseenter', () => nameBtn.style.textDecoration = 'underline');
  nameBtn.addEventListener('mouseleave', () => nameBtn.style.textDecoration = 'none');
  labelCol.appendChild(nameBtn);
  labelCol.appendChild(el('span', {
    style: {
      flexShrink: '0', color: sColor, background: sColor + '1a',
      padding: '1px 6px', borderRadius: '3px', fontSize: '9px',
      textTransform: 'uppercase', letterSpacing: '.3px',
    },
    text: stack,
  }));

  // Selector de objetivo
  const select = el('select', {
    class: 'auto-template',
    style: {
      fontSize: '11px', padding: '2px 6px',
      background: tpl ? '#7aa2f726' : 'rgba(255,255,255,.04)',
      color: tpl ? '#7aa2f7' : '#a9b1d6',
      border: `1px solid ${tpl ? '#7aa2f7' : 'rgba(255,255,255,.1)'}`,
      borderRadius: '4px', cursor: 'pointer', minWidth: '140px',
    },
    onchange: async () => {
      const val = select.value;
      await ipcRenderer.invoke('auto:set-objective', name, val ? { template: val } : null);
      renderAuto();
    },
  });
  select.appendChild(el('option', { value: '', text: '— sin objetivo —' }));
  for (const t of AUTO_TEMPLATES) {
    const opt = el('option', { value: t.name, text: t.label });
    if (tpl === t.name) opt.selected = true;
    select.appendChild(opt);
  }

  // Score pill
  const scorePill = el('span', {
    style: {
      color: scColor, background: scColor + '1a',
      padding: '2px 6px', borderRadius: '4px', fontSize: '11px',
      textAlign: 'center', minWidth: '40px', fontVariantNumeric: 'tabular-nums',
    },
    text: score != null ? `${score}/10` : '—',
  });

  row.append(toggle, labelCol, select, scorePill);
  return row;
}

function autoEventNode(e) {
  const t = new Date(e.at).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  let color = '#c0caf5';
  let icon = '·';
  if (e.type === 'skill-executed') { color = e.outcome === 'ok' ? '#9ece6a' : '#f7768e'; icon = e.outcome === 'ok' ? '✓' : '✗'; }
  else if (e.type === 'goal-reached') { color = '#9ece6a'; icon = '★'; }
  else if (e.type === 'goal-regressed') { color = '#e0af68'; icon = '↓'; }
  else if (e.type === 'circuit-breaker-trip') { color = '#f7768e'; icon = '⛔'; }
  else if (e.type === 'planner-decision') { color = '#7aa2f7'; icon = '→'; }
  else if (e.type === 'dry-run') { color = '#e0af68'; icon = '◐'; }
  else if (e.type === 'tick-skip') { color = '#565f89'; icon = '·'; }
  else if (e.type === 'tick-error' || e.type === 'analyze-error') { color = '#f7768e'; icon = '!'; }

  const detail = e.project ? `${e.project} ${e.skill || ''}`.trim() : (e.reason || e.reasoning || '');
  return el('div', { style: { color }, text: `${t} ${icon} ${e.type} ${detail}` });
}

function sectionHeader(title, count, color) {
  return el('div', {
    style: {
      display: 'flex', alignItems: 'center', gap: '8px',
      fontSize: '10px', color: color || '#7aa2f7', marginTop: '14px', marginBottom: '4px',
      textTransform: 'uppercase', letterSpacing: '.5px', fontWeight: '600',
      padding: '0 12px',
    },
  },
  el('span', { text: title }),
  el('span', {
    style: { color: '#565f89', fontWeight: '400' },
    text: `· ${count}`,
  }));
}

function groupByStack(projects) {
  const groups = {};
  for (const [name, p] of projects) {
    const s = p.stack || 'unknown';
    if (!groups[s]) groups[s] = [];
    groups[s].push([name, p]);
  }
  // Sort each group by name
  for (const k of Object.keys(groups)) groups[k].sort((a, b) => a[0].localeCompare(b[0]));
  // Return stacks in a sensible order
  const order = ['node', 'tauri+rust', 'rust', 'python', 'python+node', 'electron', 'unknown'];
  return order
    .map(s => ({ stack: s, projects: groups[s] || [] }))
    .filter(g => g.projects.length)
    .concat(Object.keys(groups).filter(k => !order.includes(k)).map(s => ({ stack: s, projects: groups[s] })));
}

function matchesSearch(name, p, q) {
  if (!q) return true;
  const lower = q.toLowerCase();
  if (name.toLowerCase().includes(lower)) return true;
  if ((p.stack || '').toLowerCase().includes(lower)) return true;
  return false;
}

let healthFilter = 'all'; // 'all', 'high', 'medium', 'low', 'ignored'

function buildProjectCard(name, proj, priorities, config) {
  const s = proj.score || 5;
  const scoreClass = s >= 7 ? 'score-high' : s >= 4 ? 'score-mid' : 'score-low';
  const checks = proj.checks || {};
  const prio = priorities[name] || 'ignored';
  const prioColor = COLORS.priority[prio] || COLORS.dim;
  const isOverride = (config.priorityOverrides || {})[name] ? true : false;

  let h = `<div class="project-card" style="${prio === 'ignored' ? 'opacity:.5;' : ''}">`;
  h += `<div class="project-card-header">`;
  h += `<span class="project-card-name">${esc(name)}</span>`;
  h += `<select class="prio-select" data-project="${esc(name)}" style="font-size:10px;padding:1px 4px;border-radius:3px;border:1px solid ${prioColor}44;background:${prioColor}22;color:${prioColor};cursor:pointer;${isOverride ? 'font-weight:700;' : ''}">`;
  h += `<option value="high"${prio === 'high' ? ' selected' : ''}>ALTA</option>`;
  h += `<option value="medium"${prio === 'medium' ? ' selected' : ''}>MEDIA</option>`;
  h += `<option value="low"${prio === 'low' ? ' selected' : ''}>BAJA</option>`;
  h += `<option value="ignored"${prio === 'ignored' ? ' selected' : ''}>IGNORADO</option>`;
  if (isOverride) h += `<option value="auto">AUTO</option>`;
  h += `</select>`;
  h += `<span class="project-card-stack">${esc(proj.stack || '?')}</span>`;
  h += `<span class="score-badge ${scoreClass}">${s}/10</span>`;
  h += `</div>`;

  h += `<div class="check-row">`;
  h += checkBadge('CLAUDE.md', checks.hasClaude);
  h += checkBadge('.gitignore', checks.hasGitignore);
  h += checkBadge('Tests', checks.hasTests);
  h += checkBadge('Git limpio', checks.gitClean);
  h += checkBadge('Deps ok', checks.depsOk);
  if (checks.lastCommitDays !== null && checks.lastCommitDays !== undefined) {
    h += `<span class="check ${checks.lastCommitDays <= 7 ? 'check-ok' : checks.lastCommitDays > 30 ? 'check-fail' : 'check-na'}">${checks.lastCommitDays}d</span>`;
  }
  h += `</div>`;

  if (proj.suggestions && proj.suggestions.length) {
    for (const sug of proj.suggestions) h += `<div class="suggestion">${esc(sug)}</div>`;
  }
  h += `</div>`;
  return h;
}

async function renderHealth() {
  const projects = await ipcRenderer.invoke('get-project-analysis');
  const priorities = await ipcRenderer.invoke('get-project-priorities');
  const config = await ipcRenderer.invoke('get-orchestrator-config');
  const entries = Object.entries(projects);

  if (!entries.length) {
    panelContent.innerHTML = `
      <div class="empty-msg">
        No hay datos de proyectos.<br><br>
        <button class="scan-btn" id="scan-btn">Escanear proyectos</button>
      </div>`;
    document.getElementById('scan-btn').addEventListener('click', startScan);
    return;
  }

  // Count per priority
  const counts = { high: 0, medium: 0, low: 0, ignored: 0 };
  entries.forEach(([name]) => { const p = priorities[name] || 'ignored'; counts[p] = (counts[p] || 0) + 1; });

  // Filter
  const filtered = healthFilter === 'all' ? entries :
    entries.filter(([name]) => (priorities[name] || 'ignored') === healthFilter);

  // Sort: high priority first, then by score ascending
  const priorityOrder = { high: 0, medium: 1, low: 2, ignored: 3 };
  filtered.sort((a, b) => {
    const pA = priorityOrder[priorities[a[0]] || 'ignored'] || 3;
    const pB = priorityOrder[priorities[b[0]] || 'ignored'] || 3;
    if (pA !== pB) return pA - pB;
    return (a[1].score || 5) - (b[1].score || 5);
  });

  let html = '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;">';
  html += `<button class="scan-btn" id="scan-btn">Re-escanear</button>`;
  const fBtn = (id, label, count) => {
    const active = healthFilter === id ? 'color:#7aa2f7;border-color:rgba(122,162,247,.4);background:rgba(122,162,247,.15);' : '';
    return `<button class="scan-btn health-filter" data-filter="${id}" style="font-size:10px;padding:2px 8px;${active}">${label} (${count})</button>`;
  };
  html += fBtn('all', 'Todos', entries.length);
  html += fBtn('high', 'Alta', counts.high);
  html += fBtn('medium', 'Media', counts.medium);
  html += fBtn('low', 'Baja', counts.low);
  html += fBtn('ignored', 'Ignorados', counts.ignored);
  html += '</div>';

  for (const [name, proj] of filtered) {

  }

  panelContent.innerHTML = html;
  document.getElementById('scan-btn').addEventListener('click', startScan);
  panelContent.querySelectorAll('.health-filter').forEach(btn => {
    btn.addEventListener('click', () => { healthFilter = btn.dataset.filter; renderHealth(); });
  });

    sel.addEventListener('change', async () => {
      await ipcRenderer.invoke('set-project-priority', { name: sel.dataset.project, priority: sel.value });
      renderHealth();
    });
  });
}

function buildSchedulerHeaderHtml(status) {
  const stateColor = status.paused ? 'var(--red)' : status.outsideWorkHours ? 'var(--green)' : 'var(--yellow)';
  const stateLabel = status.paused ? 'PAUSADO' :
                     status.running ? 'EJECUTANDO' :
                     status.outsideWorkHours ? 'ACTIVO' : 'ESPERANDO';
  const stateDetail = status.paused ? '' :
                      status.running ? '' :
                      status.outsideWorkHours ? 'fuera de horario' : 'horario laboral';
  const rl = status.rateLimits;
  const rlStr = rl ? `5h: ${rl.fiveHour.usedPercent}%` : '';
  let h = `<div class="sched-header">`;
  h += `<div class="sched-dot" style="background:${stateColor};box-shadow:0 0 8px ${stateColor}44;"></div>`;
  h += `<div>`;
  h += `<div class="sched-label" style="color:${stateColor};">${stateLabel}</div>`;
  h += `<div class="sched-meta">${stateDetail}${stateDetail && rlStr ? ' · ' : ''}${rlStr}</div>`;
  h += `</div>`;
  h += `<div class="sched-actions">`;
  if (status.paused) {
    h += `<button class="scan-btn" id="resume-btn">Reanudar</button>`;
  } else {
    h += `<button class="scan-btn" id="pause-btn" style="border-color:rgba(247,118,142,.2);color:var(--red);">Pausar</button>`;
  }
  h += `<button class="scan-btn" id="add-task-btn">+ Tarea</button>`;
  h += `</div></div>`;
  return h;
}

async function renderQueue() {
  let queue, status, config;
  try {
    [queue, status, config] = await Promise.all([
      ipcRenderer.invoke('get-queue'),
      ipcRenderer.invoke('get-scheduler-status'),
      ipcRenderer.invoke('get-orchestrator-config'),
    ]);
  } catch {
    panelContent.textContent = 'Error al cargar datos de la cola.';
    return;
  }

  let html = buildSchedulerHeaderHtml(status);
  html += buildConfigSectionHtml(status, config);

  if (!queue.length) {
    html += `<div class="empty-msg">No hay tareas en cola.<br><span style="font-size:11px;color:#565f89;">Se encolarán automáticamente fuera de horario según la salud de los proyectos.</span></div>`;
  } else {
    // Split into active (running/pending) and completed (done/failed)
    const active = queue.filter(t => t.status === 'running' || t.status === 'pending');
    const completed = queue.filter(t => t.status === 'done' || t.status === 'failed' || t.status === 'skipped');

    // Active tasks first
    if (active.length) {
      const orderA = { running: 0, pending: 1 };
      active.sort((a, b) => (orderA[a.status] || 2) - (orderA[b.status] || 2));
      html += `<div class="queue-section-label">Pendientes (${active.length})</div>`;
      for (const task of active) {
        const statusClass = task.status === 'pending' ? 'queue-pending' : 'queue-running';
        html += `<div class="queue-item">`;
        html += `<span class="queue-status ${statusClass}">${esc(task.status)}</span>`;
        html += `<span class="queue-info">${esc(task.project || '?')} — ${esc(task.skill || '?')}</span>`;
        if (task.status === 'pending') html += `<span class="queue-cost" style="color:#f7768e;cursor:pointer;" data-remove="${task.id}">✕</span>`;
        html += `</div>`;
      }
    }

    // Completed: most recent first, show time
    if (completed.length) {
      completed.sort((a, b) => {
        const ta = a.completedAt || a.startedAt || '';
        const tb = b.completedAt || b.startedAt || '';
        return tb.localeCompare(ta);
      });
      html += `<div class="queue-section-label" style="margin-top:8px;">Completadas (${completed.length})</div>`;
      for (const task of completed.slice(0, 30)) {
        const statusClass = task.status === 'done' ? 'queue-done' : 'queue-failed';
        const time = (task.completedAt || task.startedAt || '').slice(11, 16);
        const durStr = task.duration ? `${task.duration}s` : '';
        const changesBadge = task.hasChanges ? ' <span style="color:#9ece6a;font-size:9px;">+cambios</span>' : '';
        html += `<div class="queue-item">`;
        html += `<span style="font-size:9px;color:#565f89;min-width:36px;">${time}</span>`;
        html += `<span class="queue-status ${statusClass}">${esc(task.status)}</span>`;
        html += `<span class="queue-info">${esc(task.project || '?')} — ${esc(task.skill || '?')}${changesBadge}`;
        if (task.branch) html += ` <span style="color:#7aa2f7;font-size:9px;">${esc(task.branch)}</span>`;
        html += `</span>`;
        if (durStr) html += `<span class="queue-cost">${durStr}</span>`;
        html += `</div>`;
      }
    }
  }

  panelContent.innerHTML = html;

  // Wire up buttons
  const pauseBtn = document.getElementById('pause-btn');
  const resumeBtn = document.getElementById('resume-btn');
  const addTaskBtn = document.getElementById('add-task-btn');
  const saveConfigBtn = document.getElementById('save-config-btn');

  // Wire collapsible config (restore persisted state)
  const configToggle = document.getElementById('config-toggle');
  const configBody = document.getElementById('config-body');
  const configArrow = document.getElementById('config-arrow');
  if (configSectionOpen && configBody) { configBody.classList.add('open'); configArrow.classList.add('open'); }
  if (configToggle) configToggle.addEventListener('click', () => {
    configSectionOpen = !configSectionOpen;
    configBody.classList.toggle('open');
    configArrow.classList.toggle('open');
  });

  if (pauseBtn) pauseBtn.addEventListener('click', async () => { await ipcRenderer.invoke('pause-scheduler'); renderQueue(); });
  if (resumeBtn) resumeBtn.addEventListener('click', async () => { await ipcRenderer.invoke('resume-scheduler'); renderQueue(); });
  if (saveConfigBtn) saveConfigBtn.addEventListener('click', async () => {
    const start = parseInt(document.getElementById('wh-start').value) || 9;
    const end = parseInt(document.getElementById('wh-end').value) || 23;
    const budget = parseFloat(document.getElementById('budget-input').value) || 2;
    const blacklistStr = document.getElementById('blacklist-input').value || '';
    const blacklist = blacklistStr.split(',').map(s => s.trim()).filter(Boolean);
    const idleEnabled = document.getElementById('idle-enabled').checked;
    const idleMinutes = parseInt(document.getElementById('idle-minutes').value) || 15;
    const capacityEnabled = document.getElementById('capacity-enabled').checked;
    const capacityThreshold = parseInt(document.getElementById('capacity-threshold').value) || 50;
    await ipcRenderer.invoke('set-orchestrator-config', { workHours: { start, end }, dailyBudgetUsd: budget, blacklist, idleEnabled, idleMinutes, capacityEnabled, capacityThreshold });
    renderQueue();
  });
  if (addTaskBtn) addTaskBtn.addEventListener('click', () => showAddTaskDialog());

  // Wire remove buttons
  panelContent.querySelectorAll('[data-remove]').forEach(el => {
    el.addEventListener('click', async () => {
      await ipcRenderer.invoke('remove-from-queue', el.dataset.remove);
      renderQueue();
    });
  });
}

let selectedSessionCwd = null;

async function renderLog() {
  let html = '';

  html += '<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">';
  html += '<span style="font-size:11px;color:#565f89;">Sesión:</span>';
  html += '<select id="log-session-select" style="background:#1e1e2e;border:1px solid #2a2b3d;color:#c0caf5;border-radius:4px;padding:4px 8px;font-size:11px;flex:1;">';
  html += '<option value="">— Seleccionar sesión —</option>';

  try {
    const sessions = await ipcRenderer.invoke('get-sessions');
    const seen = new Set();
    for (const s of sessions) {
      if (s.cwd && s.cwd !== 'N/A' && !seen.has(s.cwd)) {
        seen.add(s.cwd);
        const sel = s.cwd === selectedSessionCwd ? ' selected' : '';
        html += `<option value="${esc(s.cwd)}"${sel}>${esc(s.project || s.cwd)}</option>`;
      }
    }
  } catch {}

  html += '</select>';

  // Also show orchestrator execution log toggle
  html += '<button class="scan-btn" id="show-exec-log" style="font-size:10px;padding:2px 8px;">Historial auto</button>';

  // Show conversation log if session selected
  if (selectedSessionCwd) {
    let entries = [];

    if (!entries.length) {
      html += '<div class="empty-msg">No hay datos de conversación para esta sesión.</div>';
    } else {
      for (const entry of entries) {
        const typeColor = entry.type === 'user' ? '#7aa2f7' :
                          entry.type === 'assistant' ? '#9ece6a' : '#565f89';
        const typeLabel = entry.type === 'user' ? 'USER' :
                          entry.type === 'assistant' ? 'CLAUDE' : 'TOOL';
        html += `<div class="queue-item" style="align-items:flex-start;">`;
        html += `<span class="queue-status" style="background:${typeColor}22;color:${typeColor};min-width:50px;text-align:center;">${typeLabel}</span>`;
        html += `<span class="queue-info" style="font-size:11px;word-break:break-word;">${esc(entry.summary || '...')}</span>`;

async function renderExecLog() {
  const log = await ipcRenderer.invoke('get-execution-log');
  if (!log.length) {
    panelContent.innerHTML = `<div class="empty-msg">No hay ejecuciones autónomas registradas.</div>`;
    return;
  }
  let html = '<div style="font-size:12px;color:#c0caf5;font-weight:600;margin-bottom:8px;">Historial de ejecuciones autónomas</div>';
  for (const entry of log.reverse()) {
    const statusClass = entry.status === 'done' ? 'queue-done' : 'queue-failed';
    const time = entry.timestamp ? new Date(entry.timestamp).toLocaleString() : '?';
    html += `<div class="queue-item">`;
    html += `<span class="queue-status ${statusClass}">${esc(entry.status || '?')}</span>`;
    html += `<span class="queue-info">${esc(entry.project || '?')} — ${esc(entry.skill || '?')}`;
    if (entry.branch) html += ` <span style="color:#bb9af7;font-size:10px;">${esc(entry.branch)}</span>`;
    html += `</span>`;
    if (entry.costUsd) html += `<span class="queue-cost">$${entry.costUsd.toFixed(3)}</span>`;
    html += `<span class="queue-cost">${esc(time)}</span>`;
    html += `</div>`;
  }
  html += '<button class="scan-btn" style="margin-top:8px;" id="exec-back-btn">Volver</button>';
  // Note: innerHTML is safe here — all dynamic values go through esc() (HTML entity escaping).
  // This is a local Electron app with contextIsolation:false, no remote content.
  panelContent.innerHTML = html;
  const backBtn = document.getElementById('exec-back-btn');
  if (backBtn) backBtn.addEventListener('click', () => renderLog());
}

async function buildLiveCycleHtml(live) {
  let h = '<div class="stats-section">';
  h += '<div class="stats-section-title">Ciclo 5h en vivo</div>';
  if (live) {
    const fillColor = COLORS.pacing[live.action] || COLORS.dim;
    h += `<div class="stats-cycle-track">`;
    h += `<div class="stats-cycle-fill" style="width:${live.usedPercent}%;background:${fillColor};"></div>`;
    h += `<div class="stats-cycle-target" style="left:${live.targetPercent}%;"></div>`;
    h += `<div class="stats-cycle-label">${live.usedPercent}% usado · Objetivo: ${live.targetPercent}% · ${live.remainingMin}m restantes · 7d: ${live.sevenDayPercent}%</div>`;
    h += `</div>`;
    try {
      const sched = await ipcRenderer.invoke('get-scheduler-status');
      const d = sched.lastTickDebug;
      const mode = sched.currentMode || 'ninguno';
      const paused = sched.paused ? ' (PAUSADO)' : '';
      const pending = sched.pendingTasks;
      let debugLine = `Modo: ${mode}${paused} · Tareas pendientes: ${pending}`;
      if (d) debugLine += ` · offHours: ${d.outsideHours} · idle: ${d.idle} · busy: ${d.busy} · pacing: ${d.pacingAction}`;
      if (d && d.reason) debugLine += ` · ${d.reason}`;
      h += `<div style="font-size:10px;color:${COLORS.dim};margin-top:4px;">${debugLine}</div>`;
    } catch {}
  } else {
    h += `<div style="font-size:11px;color:${COLORS.dim};">Sin datos de rate limit activos</div>`;
  }
  h += '</div>';
  return h;
}

function buildCycleChartHtml(data) {
  let h = '<div class="stats-section">';
  h += '<div class="stats-section-title">Uso por ciclo (últimos 20)</div>';
  if (data && data.cycleChart.length > 0) {
    const cycles = data.cycleChart;
    const chartH = 100;
    const barW = Math.floor(340 / Math.max(cycles.length, 1));
    const gap = 2;
    const svgW = cycles.length * barW;
    h += `<div class="stats-chart-wrap"><svg width="${svgW}" height="${chartH + 18}" viewBox="0 0 ${svgW} ${chartH + 18}">`;
    const targetY = chartH - (95 / 100 * chartH);
    h += `<line x1="0" y1="${targetY}" x2="${svgW}" y2="${targetY}" stroke="${COLORS.yellow}" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>`;
    for (let i = 0; i < cycles.length; i++) {
      const pct = cycles[i].fiveHourPercent || 0;
      const bh = pct / 100 * chartH;
      const x = i * barW + gap / 2;
      const w = barW - gap;
      const y = chartH - bh;
      const date = cycles[i].capturedAt ? new Date(cycles[i].capturedAt).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }) : '';
      h += `<rect x="${x}" y="${y}" width="${w}" height="${bh}" rx="2" fill="${COLORS.blue}" opacity=".85"><title>${date}: ${pct}%</title></rect>`;
      if (cycles.length <= 20) {
        h += `<text x="${x + w / 2}" y="${chartH + 12}" text-anchor="middle" font-size="8" fill="${COLORS.dim}">${date}</text>`;
      }
    }
    h += '</svg></div>';
  } else {
    h += `<div style="font-size:11px;color:${COLORS.dim};">Sin datos de ciclos aún</div>`;
  }
  h += '</div>';
  return h;
}

  // 5. Project heatmap

    html += '<div class="stats-section">';

    for (const p of data.projectHeatmap) {
      const pct = maxCount > 0 ? (p.count / maxCount * 100) : 0;
      html += `<div class="stats-hbar-row">`;
      html += `<div class="stats-hbar-name" title="${esc(p.project)}">${esc(p.project)}</div>`;
      html += `<div class="stats-hbar-track"><div class="stats-hbar-fill" style="width:${pct}%;"></div></div>`;
      html += `<div class="stats-hbar-count">${p.count}</div>`;
      html += `</div>`;
    }
    html += '</div>';
  }

  if (!data || (data.cycleChart.length === 0 && Object.keys(data.activityBySkill).length === 0 && data.projectHeatmap.length === 0)) {
    html += '<div class="empty-msg">Sin datos históricos aún. Los datos se acumulan con las ejecuciones del orquestador.</div>';
  }

  panelContent.innerHTML = html;
}

// Live scheduler status updates — only relevant in the panel window.
ipcRenderer.on('scheduler-status', (ev, status) => {
  if (!isPanel) return;
  if (currentTab === 'queue') renderQueue();
  if (currentTab === 'stats') renderStats();
});

// Show setup chip if hook is missing
ipcRenderer.on('hook-missing', () => {
  let sc = document.getElementById('setup-chip');
  if (sc) return;
  sc = document.createElement('div');
  sc.id = 'setup-chip';
  sc.className = 'chip setup';
  function setChipText(text, color) {
    while (sc.firstChild) sc.removeChild(sc.firstChild);
    const m = document.createElement('div'); m.className = 'chip-main';
    const n = document.createElement('span'); n.className = 'name'; n.style.color = color; n.textContent = text;
    m.appendChild(n); sc.appendChild(m);
  }
  setChipText('Configurar hook', '#e0af68');
  sc.title = 'Click para configurar el hook de Claude Code (necesario para detectar estados)';
  sc.addEventListener('click', async () => {
    setChipText('Configurando...', '#e0af68');
    const ok = await ipcRenderer.invoke('run-setup-hook');
    if (ok) { sc.remove(); refresh(); }
    else { setChipText('Error al configurar', '#f7768e'); }
  });
  document.querySelector('.chips').prepend(sc);
});
</script>
</body>
</html>
