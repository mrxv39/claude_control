<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bar">
  <span class="logo">Sessions</span>
  <div class="chips" id="chips"></div>
  <span class="stats" id="stats"></span>
  <span id="idle-indicator" style="display:none;font-size:10px;color:#bb9af7;background:rgba(187,154,247,.15);padding:2px 6px;border-radius:3px;flex-shrink:0;-webkit-app-region:no-drag;" title="Ejecutando tareas automáticas"></span>
  <span id="avg-indicator" style="display:none;font-size:10px;padding:2px 6px;border-radius:3px;flex-shrink:0;-webkit-app-region:no-drag;cursor:pointer;" title="Media de uso de tokens (7d) — click para ver detalle">AVG ?%</span>
  <button class="bar-btn minimize-all" id="minimize-all-btn" title="Minimizar todas las consolas" aria-label="Minimizar todas las consolas">&#9644;</button>
  <button class="bar-btn gear" id="gear-btn" title="Panel del orquestador" aria-label="Abrir panel del orquestador">&#9881;</button>
  <button class="bar-btn close" id="close-btn" aria-label="Ocultar barra">✕</button>
</div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-tabs" role="tablist">
      <button class="panel-tab active" data-tab="health" role="tab" aria-selected="true">Salud</button>
      <button class="panel-tab" data-tab="queue" role="tab" aria-selected="false">Cola</button>
      <button class="panel-tab" data-tab="log" role="tab" aria-selected="false">Log</button>
      <button class="panel-tab" data-tab="stats" role="tab" aria-selected="false">Stats</button>
      <button class="panel-tab" data-tab="auto" role="tab" aria-selected="false">Autónomo</button>
    </div>
    <span class="panel-budget" id="budget-display"></span>
    <button class="panel-close" id="panel-close-btn" aria-label="Cerrar panel">Cerrar</button>
  </div>
  <div class="panel-content" id="panel-content" role="tabpanel"></div>
</div>
<script>
const { ipcRenderer } = require('electron');
const { initBar } = require('./renderer/bar.js');
const { initPanelCore } = require('./renderer/panel-core.js');
const { createLogTab } = require('./renderer/tab-log.js');
const { createStatsTab } = require('./renderer/tab-stats.js');
const { createQueueTab } = require('./renderer/tab-queue.js');
const { createHealthTab } = require('./renderer/tab-health.js');
const { createAutoTab } = require('./renderer/tab-auto.js');

// Same index.html serves two windows: the always-on-top bar (default) and the
// orchestrator panel (loaded with hash '#panel'). The flag below gates the
// init paths so each window only runs the JS it needs.
const isPanel = window.location.hash === '#panel';
if (isPanel) document.body.classList.add('panel-mode');

const barApi = initBar({ ipcRenderer, isPanel });

const logTab = createLogTab({ ipcRenderer });
const statsTab = createStatsTab({ ipcRenderer });
const queueTab = createQueueTab({ ipcRenderer });
const healthTab = createHealthTab({ ipcRenderer });
const autoTab = createAutoTab({ ipcRenderer });

const panelCore = initPanelCore({
  ipcRenderer,
  isPanel,
  tabRenderers: {
    health: healthTab.renderHealth,
    queue: queueTab.renderQueue,
    log: logTab.renderLog,
    stats: statsTab.renderStats,
    auto: autoTab.renderAuto,
  },
});

// Push stream auto:event — throttled refresh cuando el tab Autonomo esta activo.
autoTab.attachEventStream(panelCore);

// Live scheduler status updates — only relevant in the panel window.
ipcRenderer.on('scheduler-status', (ev, status) => {
  if (!isPanel) return;
  const currentTab = panelCore.getCurrentTab();
  if (currentTab === 'queue') queueTab.renderQueue();
  if (currentTab === 'stats') statsTab.renderStats();
});

// Show setup chip if hook is missing
ipcRenderer.on('hook-missing', () => {
  let sc = document.getElementById('setup-chip');
  if (sc) return;
  sc = document.createElement('div');
  sc.id = 'setup-chip';
  sc.className = 'chip setup';
  function setChipText(text, color) {
    while (sc.firstChild) sc.removeChild(sc.firstChild);
    const m = document.createElement('div'); m.className = 'chip-main';
    const n = document.createElement('span'); n.className = 'name'; n.style.color = color; n.textContent = text;
    m.appendChild(n); sc.appendChild(m);
  }
  setChipText('Configurar hook', '#e0af68');
  sc.title = 'Click para configurar el hook de Claude Code (necesario para detectar estados)';
  sc.addEventListener('click', async () => {
    setChipText('Configurando...', '#e0af68');
    const ok = await ipcRenderer.invoke('run-setup-hook');
    if (ok) { sc.remove(); barApi.refresh(); }
    else { setChipText('Error al configurar', '#f7768e'); }
  });
  document.querySelector('.chips').prepend(sc);
});
</script>
</body>
</html>
