<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#181825; overflow:hidden; user-select:none; -webkit-app-region:drag; }
.bar { display:flex; align-items:center; height:44px; padding:0 14px; gap:8px; }
.logo { font-size:13px; font-weight:600; color:#7aa2f7; margin-right:8px; flex-shrink:0; }
.chips { display:flex; align-items:center; gap:6px; overflow-x:auto; flex:1; scrollbar-width:none; }
.chips::-webkit-scrollbar { display:none; }
.chip { display:flex; align-items:center; gap:6px; padding:5px 11px; border-radius:6px; cursor:pointer; white-space:nowrap; flex-shrink:0; -webkit-app-region:no-drag; border:1px solid transparent; }
.chip:hover { filter:brightness(1.3); }
.chip.busy { background:rgba(247,118,142,.2); border-color:rgba(247,118,142,.3); }
.chip.waiting { background:rgba(224,175,104,.2); border-color:rgba(224,175,104,.3); }
.chip.idle { background:rgba(158,206,106,.2); border-color:rgba(158,206,106,.3); }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.busy .dot { background:#f7768e; }
.waiting .dot { background:#e0af68; }
.idle .dot { background:#9ece6a; }
.name { font-size:12px; font-weight:500; color:#c0caf5; }
.run { font-size:10px; color:#565f89; }
.stats { font-size:11px; color:#565f89; flex-shrink:0; margin-left:8px; }
.close { background:rgba(255,255,255,.08); border:none; color:#565f89; font-size:13px; cursor:pointer; padding:3px 7px; border-radius:4px; -webkit-app-region:no-drag; }
.close:hover { background:rgba(247,118,142,.3); color:#f7768e; }
</style>
</head>
<body>
<div class="bar">
  <span class="logo">Sessions</span>
  <div class="chips" id="chips"></div>
  <span class="stats" id="stats"></span>
  <button class="close" onclick="window.close()">✕</button>
</div>
<script>
const { ipcRenderer } = require('electron');
const chips = document.getElementById('chips');
const stats = document.getElementById('stats');

function render(sessions) {
  chips.innerHTML = '';
  if (!sessions.length) { chips.innerHTML = '<span class="run">No sessions</span>'; stats.textContent = ''; return; }
  const order = {BUSY:0, WAITING:1, IDLE:2};
  sessions.sort((a,b) => (order[a.status]||2) - (order[b.status]||2));
  let b=0, w=0, i=0;
  sessions.forEach(s => {
    if (s.status==='BUSY') b++; else if (s.status==='WAITING') w++; else i++;
    const d = document.createElement('div');
    d.className = 'chip ' + s.status.toLowerCase();
    const run = s.running !== '-' ? ` <span class="run">[${s.running}]</span>` : '';
    d.innerHTML = `<span class="dot"></span><span class="name">${s.project}</span>${run}`;
    d.addEventListener('click', () => ipcRenderer.invoke('focus-wt', { hwnd: s.hwnd, tabIndex: s.tabIndex }));
    chips.appendChild(d);
  });
  stats.textContent = `${sessions.length}T ${b}● ${w}◉ ${i}○`;
}

async function refresh() { render(await ipcRenderer.invoke('get-sessions')); }
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
