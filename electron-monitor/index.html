<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bar">
  <span class="logo">Sessions</span>
  <div class="chips" id="chips"></div>
  <span class="stats" id="stats"></span>
  <span id="idle-indicator" style="display:none;font-size:10px;color:#bb9af7;background:rgba(187,154,247,.15);padding:2px 6px;border-radius:3px;flex-shrink:0;-webkit-app-region:no-drag;" title="Ejecutando tareas automáticas"></span>
  <button class="minimize-all" id="minimize-all-btn" title="Minimizar todas las consolas" aria-label="Minimizar todas las consolas">&#9644;</button>
  <button class="gear" id="gear-btn" title="Panel del orquestador" aria-label="Abrir panel del orquestador">&#9881;</button>
  <button class="close" id="close-btn" aria-label="Ocultar barra">✕</button>
</div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="health">Salud</button>
      <button class="panel-tab" data-tab="queue">Cola</button>
      <button class="panel-tab" data-tab="log">Log</button>
      <button class="panel-tab" data-tab="stats">Stats</button>
    </div>
    <span class="panel-budget" id="budget-display"></span>
    <button class="panel-close" id="panel-close-btn" aria-label="Cerrar panel">Cerrar</button>
  </div>
  <div class="panel-content" id="panel-content"></div>
</div>
<script>
const { ipcRenderer } = require('electron');
const chips = document.getElementById('chips');
const stats = document.getElementById('stats');

const selected = new Set(); // hwnd values
const gitCache = {}; // cwd -> { branch, dirty, recentCommits }

function render(sessions) {
  chips.innerHTML = '';
  if (!sessions.length) { chips.innerHTML = '<span class="run">No sessions</span>'; stats.textContent = ''; return; }

  // Group sessions by cwd
  const groups = new Map();
  for (const s of sessions) {
    const key = (s.cwd && s.cwd !== 'N/A') ? s.cwd.toLowerCase() : `_pid_${s.pid}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(s);
  }

  // Merge each group into a single display item
  const order = {BUSY:0, WAITING:1, IDLE:2};
  const items = [];
  for (const [, group] of groups) {
    const claude = group.filter(s => s.isClaude);
    const nonClaude = group.filter(s => !s.isClaude);
    let primary;
    if (claude.length > 0) {
      claude.sort((a,b) => (order[a.status]||2) - (order[b.status]||2));
      primary = claude[0];
    } else {
      primary = group[0];
    }
    const primaryHwnd = primary.hwnd || 0;
    const services = nonClaude.map(s => ({
      label: (s.running && s.running !== '-') ? s.running : (s.shell || '?'),
      hwnd: s.hwnd || primaryHwnd,  // fallback to Claude session's HWND
      tabIndex: s.tabIndex
    })).filter(sv => sv.label);
    items.push({ ...primary, services });
  }
  items.sort((a,b) => (order[a.status]||2) - (order[b.status]||2));

  // Drop stale hwnds from selection
  const live = new Set(items.map(s => s.hwnd).filter(Boolean));
  for (const h of [...selected]) if (!live.has(h)) selected.delete(h);

  let b=0, w=0, i=0;
  items.forEach(s => {
    if (s.status==='BUSY') b++; else if (s.status==='WAITING') w++; else i++;
    const d = document.createElement('div');
    d.className = 'chip ' + s.status.toLowerCase();
    if (s.hwnd && selected.has(s.hwnd)) d.classList.add('selected');
    const ctx = s.contextPercent || 0;
    d.title = `${s.project}\n${s.cwd || ''}\nEstado: ${s.status}\nContexto: ${ctx}%\nPID: ${s.pid}`;
    const run = s.running !== '-' ? ` <span class="run">[${s.running}]</span>` : '';

    // Build main row with cached git badge
    const mainDiv = document.createElement('div');
    mainDiv.className = 'chip-main';
    const cached = s.cwd ? gitCache[s.cwd] : null;
    let gitHtml = '';
    if (cached && cached.branch) {
      const shortBranch = cached.branch.length > 16 ? cached.branch.slice(0, 15) + '\u2026' : cached.branch;
      const cls = cached.dirty > 0 ? 'git-badge git-dirty' : 'git-badge';
      gitHtml = `<span class="${cls}" title="${cached.branch}">${shortBranch}${cached.dirty > 0 ? ' +' + cached.dirty : ''}</span>`;
    }
    let ctxHtml = '';
    if (s.isClaude && ctx > 0) {
      const ctxCls = ctx < 50 ? 'ctx-low' : ctx < 80 ? 'ctx-mid' : 'ctx-high';
      ctxHtml = `<span class="ctx-badge ${ctxCls}">${ctx}%</span>`;
    }
    mainDiv.innerHTML = `<span class="dot"></span><span class="name">${s.project}</span>${run}${gitHtml}${ctxHtml}`;
    d.appendChild(mainDiv);

    // Context usage bar (only for Claude sessions)
    if (s.isClaude && ctx > 0) {
      const barColor = ctx < 50 ? '#9ece6a' : ctx < 80 ? '#e0af68' : '#f7768e';
      const bar = document.createElement('div');
      bar.className = 'ctx-bar';
      bar.innerHTML = `<div class="ctx-fill" style="width:${Math.min(ctx,100)}%;background:${barColor}"></div>`;
      d.appendChild(bar);
    }

    // Build service row with clickable badges
    if (s.services.length) {
      const svcDiv = document.createElement('div');
      svcDiv.className = 'chip-svc';
      s.services.forEach(sv => {
        const badge = document.createElement('span');
        badge.className = 'svc';
        badge.textContent = '\u2699 ' + sv.label;
        badge.addEventListener('click', (ev) => {
          ev.stopPropagation();
          selected.clear();
          ipcRenderer.invoke('focus-wt', { hwnd: sv.hwnd, tabIndex: sv.tabIndex });
          refresh();
        });
        svcDiv.appendChild(badge);
      });
      d.appendChild(svcDiv);
    }

    // Main chip click: focus Claude session
    d.addEventListener('click', (ev) => {
      if ((ev.ctrlKey || ev.metaKey) && s.hwnd) {
        if (selected.has(s.hwnd)) selected.delete(s.hwnd);
        else selected.add(s.hwnd);
        if (selected.size >= 2) {
          ipcRenderer.invoke('tile-windows', [...selected]);
        }
        refresh();
        return;
      }
      selected.clear();
      ipcRenderer.invoke('focus-wt', { hwnd: s.hwnd, tabIndex: s.tabIndex });
      refresh();
    });
    chips.appendChild(d);
  });
  const total = sessions.length;
  stats.textContent = `${total}T ${b}● ${w}◉ ${i}○` + (selected.size ? ` · ${selected.size} sel` : '');
  // Debounced resize to avoid jank
  clearTimeout(render._resizeTimer);
  render._resizeTimer = setTimeout(() => {
    const bar = document.querySelector('.bar');
    if (bar) {
      const w = bar.scrollWidth + 4;
      if (w !== render._lastWidth) { render._lastWidth = w; ipcRenderer.invoke('resize-bar', w); }
    }
  }, 100);
}

async function refresh() {
  const sessions = await ipcRenderer.invoke('get-sessions');
  // Update git cache in background (doesn't block render)
  const cwds = new Set(sessions.filter(s => s.cwd && s.cwd !== 'N/A').map(s => s.cwd));
  for (const cwd of cwds) {
    if (!gitCache[cwd]) gitCache[cwd] = { branch: null, dirty: 0, recentCommits: [] };
    ipcRenderer.invoke('get-git-status', cwd).then(git => {
      if (git) gitCache[cwd] = git;
    }).catch(() => {});
  }
  render(sessions);
  // Update status indicator (idle / capacity / auto)
  try {
    const sched = await ipcRenderer.invoke('get-scheduler-status');
    const ind = document.getElementById('idle-indicator');
    if (sched.rateLimits) {
      const pct = Math.round(sched.rateLimits.fiveHour.usedPercent);
      const p = sched.pacingDecision;
      const color = pct < 50 ? '#9ece6a' : pct < 80 ? '#e0af68' : '#f7768e';
      let label = `5h:${pct}%`;
      if (p && p.targetUsage !== undefined) label += `→${Math.round(p.targetUsage)}%`;
      if (p && p.action === 'burst') label += ' BURST';
      else if (p && p.action === 'coast') label += ' coast';
      if (sched.running) {
        const modeTag = { 'off-hours': 'AUTO', 'idle': 'IDLE', 'capacity': 'CAP' }[sched.currentMode] || 'AUTO';
        label += ' ' + modeTag;
      }
      ind.textContent = label;
      ind.style.display = '';
      ind.style.color = color;
      ind.style.background = color + '22';
    } else if (sched.running) {
      const modeLabels = { 'off-hours': 'AUTO', 'idle': 'AUTO-IDLE', 'capacity': 'AUTO-CAP' };
      ind.textContent = modeLabels[sched.currentMode] || 'AUTO';
      ind.style.display = '';
      ind.style.color = '#bb9af7';
      ind.style.background = 'rgba(187,154,247,.15)';
    } else if (sched.userIsIdle && sched.idleEnabled && !sched.paused) {
      ind.textContent = `idle ${sched.userIdleFor}m`;
      ind.style.display = '';
      ind.style.color = '#565f89';
      ind.style.background = 'rgba(255,255,255,.05)';
    } else {
      ind.style.display = 'none';
    }
  } catch {}
}
refresh();
setInterval(refresh, 3000);

// Show update chip if available
ipcRenderer.on('update-available', (ev, version, url) => {
  let upd = document.getElementById('update-chip');
  if (upd) return;
  upd = document.createElement('div');
  upd.id = 'update-chip';
  upd.className = 'chip update';
  upd.innerHTML = `<div class="chip-main"><span class="name" style="color:#e0af68">Update ${version}</span></div>`;
  upd.title = 'Click para descargar la nueva version';
  upd.addEventListener('click', () => { require('electron').shell.openExternal(url); });
  document.querySelector('.chips').prepend(upd);
});

// ---- Orchestrator panel ----
const gearBtn = document.getElementById('gear-btn');
const panel = document.getElementById('panel');
const panelContent = document.getElementById('panel-content');
const budgetDisplay = document.getElementById('budget-display');
let currentTab = 'health';

async function togglePanel() {
  const isOpen = await ipcRenderer.invoke('toggle-panel');
  panel.classList.toggle('open', isOpen);
  gearBtn.classList.toggle('active', isOpen);
  if (isOpen) loadTab(currentTab);
}
gearBtn.addEventListener('click', togglePanel);
document.getElementById('panel-close-btn').addEventListener('click', togglePanel);
document.getElementById('close-btn').addEventListener('click', () => {
  if (panel.classList.contains('open')) togglePanel();
  else ipcRenderer.invoke('hide-bar');
});
const minBtn = document.getElementById('minimize-all-btn');
let minimizedHwnds = [];
minBtn.addEventListener('click', async () => {
  if (minimizedHwnds.length > 0) {
    await ipcRenderer.invoke('restore-wt', minimizedHwnds);
    minimizedHwnds = [];
    minBtn.textContent = '\u2584';
    minBtn.title = 'Minimizar todas las consolas';
  } else {
    minimizedHwnds = await ipcRenderer.invoke('minimize-all-wt');
    if (minimizedHwnds.length > 0) {
      minBtn.textContent = '\u25FB';
      minBtn.title = 'Restaurar consolas minimizadas';
    }
  }
});

document.querySelectorAll('.panel-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.panel-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    loadTab(currentTab);
  });
});

async function loadTab(tab) {
  // Update budget display
  try {
    const budget = await ipcRenderer.invoke('get-budget-status');
    budgetDisplay.textContent = `$${budget.todaySpent.toFixed(2)} / $${budget.dailyBudget.toFixed(2)}`;
  } catch {}

  if (tab === 'health') await renderHealth();
  else if (tab === 'queue') await renderQueue();
  else if (tab === 'log') await renderLog();
  else if (tab === 'stats') await renderStats();
}

let healthFilter = 'all'; // 'all', 'high', 'medium', 'low', 'ignored'

async function renderHealth() {
  const projects = await ipcRenderer.invoke('get-project-analysis');
  const priorities = await ipcRenderer.invoke('get-project-priorities');
  const config = await ipcRenderer.invoke('get-orchestrator-config');
  const entries = Object.entries(projects);

  if (!entries.length) {
    panelContent.innerHTML = `
      <div class="empty-msg">
        No hay datos de proyectos.<br><br>
        <button class="scan-btn" id="scan-btn">Escanear proyectos</button>
      </div>`;
    document.getElementById('scan-btn').addEventListener('click', startScan);
    return;
  }

  // Count per priority
  const counts = { high: 0, medium: 0, low: 0, ignored: 0 };
  entries.forEach(([name]) => { const p = priorities[name] || 'ignored'; counts[p] = (counts[p] || 0) + 1; });

  // Filter
  const filtered = healthFilter === 'all' ? entries :
    entries.filter(([name]) => (priorities[name] || 'ignored') === healthFilter);

  // Sort: high priority first, then by score ascending
  const priorityOrder = { high: 0, medium: 1, low: 2, ignored: 3 };
  filtered.sort((a, b) => {
    const pA = priorityOrder[priorities[a[0]] || 'ignored'] || 3;
    const pB = priorityOrder[priorities[b[0]] || 'ignored'] || 3;
    if (pA !== pB) return pA - pB;
    return (a[1].score || 5) - (b[1].score || 5);
  });

  let html = '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;">';
  html += `<button class="scan-btn" id="scan-btn">Re-escanear</button>`;
  const fBtn = (id, label, count) => {
    const active = healthFilter === id ? 'color:#7aa2f7;border-color:rgba(122,162,247,.4);background:rgba(122,162,247,.15);' : '';
    return `<button class="scan-btn health-filter" data-filter="${id}" style="font-size:10px;padding:2px 8px;${active}">${label} (${count})</button>`;
  };
  html += fBtn('all', 'Todos', entries.length);
  html += fBtn('high', 'Alta', counts.high);
  html += fBtn('medium', 'Media', counts.medium);
  html += fBtn('low', 'Baja', counts.low);
  html += fBtn('ignored', 'Ignorados', counts.ignored);
  html += '</div>';

  for (const [name, proj] of filtered) {
    const s = proj.score || 5;
    const scoreClass = s >= 7 ? 'score-high' : s >= 4 ? 'score-mid' : 'score-low';
    const checks = proj.checks || {};
    const prio = priorities[name] || 'ignored';
    const prioColor = prio === 'high' ? '#9ece6a' : prio === 'medium' ? '#e0af68' : prio === 'low' ? '#7aa2f7' : '#565f89';
    const isOverride = (config.priorityOverrides || {})[name] ? true : false;

    html += `<div class="project-card" style="${prio === 'ignored' ? 'opacity:.5;' : ''}">`;
    html += `<div class="project-card-header">`;
    html += `<span class="project-card-name">${esc(name)}</span>`;
    html += `<select class="prio-select" data-project="${esc(name)}" style="font-size:10px;padding:1px 4px;border-radius:3px;border:1px solid ${prioColor}44;background:${prioColor}22;color:${prioColor};cursor:pointer;${isOverride ? 'font-weight:700;' : ''}">`;
    html += `<option value="high"${prio === 'high' ? ' selected' : ''}>ALTA</option>`;
    html += `<option value="medium"${prio === 'medium' ? ' selected' : ''}>MEDIA</option>`;
    html += `<option value="low"${prio === 'low' ? ' selected' : ''}>BAJA</option>`;
    html += `<option value="ignored"${prio === 'ignored' ? ' selected' : ''}>IGNORADO</option>`;
    if (isOverride) html += `<option value="auto">AUTO</option>`;
    html += `</select>`;
    html += `<span class="project-card-stack">${esc(proj.stack || '?')}</span>`;
    html += `<span class="score-badge ${scoreClass}">${s}/10</span>`;
    html += `</div>`;

    // Checks row
    html += `<div class="check-row">`;
    html += checkBadge('CLAUDE.md', checks.hasClaude);
    html += checkBadge('.gitignore', checks.hasGitignore);
    html += checkBadge('Tests', checks.hasTests);
    html += checkBadge('Git limpio', checks.gitClean);
    html += checkBadge('Deps ok', checks.depsOk);
    if (checks.lastCommitDays !== null && checks.lastCommitDays !== undefined) {
      html += `<span class="check ${checks.lastCommitDays <= 7 ? 'check-ok' : checks.lastCommitDays > 30 ? 'check-fail' : 'check-na'}">${checks.lastCommitDays}d</span>`;
    }
    html += `</div>`;

    // Suggestions
    if (proj.suggestions && proj.suggestions.length) {
      for (const sug of proj.suggestions) {
        html += `<div class="suggestion">${esc(sug)}</div>`;
      }
    }
    html += `</div>`;
  }

  panelContent.innerHTML = html;
  document.getElementById('scan-btn').addEventListener('click', startScan);
  panelContent.querySelectorAll('.health-filter').forEach(btn => {
    btn.addEventListener('click', () => { healthFilter = btn.dataset.filter; renderHealth(); });
  });
  panelContent.querySelectorAll('.prio-select').forEach(sel => {
    sel.addEventListener('change', async () => {
      await ipcRenderer.invoke('set-project-priority', { name: sel.dataset.project, priority: sel.value });
      renderHealth();
    });
  });
}

function checkBadge(label, value) {
  if (value === true) return `<span class="check check-ok">${esc(label)}</span>`;
  if (value === false) return `<span class="check check-fail">${esc(label)}</span>`;
  return `<span class="check check-na">${esc(label)}</span>`;
}

async function startScan() {
  const btn = document.getElementById('scan-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Escaneando...'; }
  try {
    await ipcRenderer.invoke('run-project-scan');
    await renderHealth();
  } catch {
    if (btn) { btn.disabled = false; btn.textContent = 'Error — reintentar'; }
  }
}

async function renderQueue() {
  const queue = await ipcRenderer.invoke('get-queue');
  const status = await ipcRenderer.invoke('get-scheduler-status');
  const config = await ipcRenderer.invoke('get-orchestrator-config');

  let html = '';

  // Scheduler status header — prominent, always visible
  const stateColor = status.paused ? 'var(--red)' : status.outsideWorkHours ? 'var(--green)' : 'var(--yellow)';
  const stateLabel = status.paused ? 'PAUSADO' :
                     status.running ? 'EJECUTANDO' :
                     status.outsideWorkHours ? 'ACTIVO' : 'ESPERANDO';
  const stateDetail = status.paused ? '' :
                      status.running ? '' :
                      status.outsideWorkHours ? 'fuera de horario' : 'horario laboral';
  const rl = status.rateLimits;
  const p = status.pacingDecision;
  const rlStr = rl ? `5h: ${rl.fiveHour.usedPercent}%` : '';
  html += `<div class="sched-header">`;
  html += `<div class="sched-dot" style="background:${stateColor};box-shadow:0 0 8px ${stateColor}44;"></div>`;
  html += `<div>`;
  html += `<div class="sched-label" style="color:${stateColor};">${stateLabel}</div>`;
  html += `<div class="sched-meta">${stateDetail}${stateDetail && rlStr ? ' · ' : ''}${rlStr}</div>`;
  html += `</div>`;
  html += `<div class="sched-actions">`;
  if (status.paused) {
    html += `<button class="scan-btn" id="resume-btn">Reanudar</button>`;
  } else {
    html += `<button class="scan-btn" id="pause-btn" style="border-color:rgba(247,118,142,.2);color:var(--red);">Pausar</button>`;
  }
  html += `<button class="scan-btn" id="add-task-btn">+ Tarea</button>`;
  html += `</div></div>`;

  // Collapsible config section
  const bl = (config.blacklist || []).join(', ');
  const idleChecked = status.idleEnabled ? 'checked' : '';
  const capChecked = status.capacityEnabled ? 'checked' : '';
  const pacingStr = p && p.cycle ? `${p.action} · ${p.cycle.remainingMin}m · target ${p.targetUsage}%` : '';
  html += `<div class="config-section">`;
  html += `<div class="config-toggle" id="config-toggle">`;
  html += `<span class="config-toggle-label">Configuracion</span>`;
  html += `<span style="font-size:10px;color:var(--text-dim);">${status.workHours.start}:00–${status.workHours.end}:00${pacingStr ? ' · ' + pacingStr : ''}</span>`;
  html += `<span class="config-toggle-arrow" id="config-arrow">&#9660;</span>`;
  html += `</div>`;
  html += `<div class="config-body" id="config-body">`;
  html += `<div class="config-row"><span class="config-label">Horario</span>`;
  html += `<input type="number" class="config-input" id="wh-start" value="${status.workHours.start}" min="0" max="23">`;
  html += `<span style="font-size:10px;color:var(--text-dim);">a</span>`;
  html += `<input type="number" class="config-input" id="wh-end" value="${status.workHours.end}" min="0" max="23">`;
  html += `<span class="config-label" style="margin-left:12px;">Budget $</span>`;
  html += `<input type="number" class="config-input" id="budget-input" value="${status.dailyBudget}" min="0" step="0.5" style="width:50px;">`;
  html += `</div>`;
  html += `<div class="config-row"><span class="config-label">Blacklist</span>`;
  html += `<input type="text" class="config-input" id="blacklist-input" value="${esc(bl)}" placeholder="proyecto1, proyecto2">`;
  html += `</div>`;
  html += `<div class="config-row"><span class="config-label">Idle</span>`;
  html += `<input type="checkbox" id="idle-enabled" ${idleChecked} style="-webkit-app-region:no-drag;">`;
  html += `<span style="font-size:10px;color:var(--text-dim);">tras</span>`;
  html += `<input type="number" class="config-input" id="idle-minutes" value="${status.idleMinutes}" min="5" max="120">`;
  html += `<span style="font-size:10px;color:var(--text-dim);">min</span>`;
  html += `<span class="config-value" style="color:var(--purple);">Actual: ${status.userIdleFor}m</span>`;
  html += `</div>`;
  html += `<div class="config-row"><span class="config-label">Pacing</span>`;
  html += `<input type="checkbox" id="capacity-enabled" ${capChecked} style="-webkit-app-region:no-drag;">`;
  html += `<span style="font-size:10px;color:var(--text-dim);">Tick:</span>`;
  html += `<span style="font-size:10px;color:var(--yellow);">${Math.round((status.tickInterval || 60000) / 1000)}s</span>`;
  html += `<input type="number" class="config-input" id="capacity-threshold" value="${status.capacityThreshold}" min="10" max="90" style="display:none;">`;
  html += `</div>`;
  html += `<div style="padding-top:6px;"><button class="scan-btn" id="save-config-btn" style="font-size:10px;padding:3px 12px;">Guardar</button></div>`;
  html += `</div></div>`;

  if (!queue.length) {
    html += `<div class="empty-msg">No hay tareas en cola.<br><span style="font-size:11px;color:#565f89;">Se encolarán automáticamente fuera de horario según la salud de los proyectos.</span></div>`;
  } else {
    // Split into active (running/pending) and completed (done/failed)
    const active = queue.filter(t => t.status === 'running' || t.status === 'pending');
    const completed = queue.filter(t => t.status === 'done' || t.status === 'failed' || t.status === 'skipped');

    // Active tasks first
    if (active.length) {
      const orderA = { running: 0, pending: 1 };
      active.sort((a, b) => (orderA[a.status] || 2) - (orderA[b.status] || 2));
      html += `<div class="queue-section-label">Pendientes (${active.length})</div>`;
      for (const task of active) {
        const statusClass = task.status === 'pending' ? 'queue-pending' : 'queue-running';
        html += `<div class="queue-item">`;
        html += `<span class="queue-status ${statusClass}">${esc(task.status)}</span>`;
        html += `<span class="queue-info">${esc(task.project || '?')} — ${esc(task.skill || '?')}</span>`;
        if (task.status === 'pending') html += `<span class="queue-cost" style="color:#f7768e;cursor:pointer;" data-remove="${task.id}">✕</span>`;
        html += `</div>`;
      }
    }

    // Completed: most recent first, show time
    if (completed.length) {
      completed.sort((a, b) => {
        const ta = a.completedAt || a.startedAt || '';
        const tb = b.completedAt || b.startedAt || '';
        return tb.localeCompare(ta);
      });
      html += `<div class="queue-section-label" style="margin-top:8px;">Completadas (${completed.length})</div>`;
      for (const task of completed.slice(0, 30)) {
        const statusClass = task.status === 'done' ? 'queue-done' : 'queue-failed';
        const time = (task.completedAt || task.startedAt || '').slice(11, 16);
        const durStr = task.duration ? `${task.duration}s` : '';
        const changesBadge = task.hasChanges ? ' <span style="color:#9ece6a;font-size:9px;">+cambios</span>' : '';
        html += `<div class="queue-item">`;
        html += `<span style="font-size:9px;color:#565f89;min-width:36px;">${time}</span>`;
        html += `<span class="queue-status ${statusClass}">${esc(task.status)}</span>`;
        html += `<span class="queue-info">${esc(task.project || '?')} — ${esc(task.skill || '?')}${changesBadge}`;
        if (task.branch) html += ` <span style="color:#7aa2f7;font-size:9px;">${esc(task.branch)}</span>`;
        html += `</span>`;
        if (durStr) html += `<span class="queue-cost">${durStr}</span>`;
        html += `</div>`;
      }
    }
  }

  panelContent.innerHTML = html;

  // Wire up buttons
  const pauseBtn = document.getElementById('pause-btn');
  const resumeBtn = document.getElementById('resume-btn');
  const addTaskBtn = document.getElementById('add-task-btn');
  const saveConfigBtn = document.getElementById('save-config-btn');

  // Wire collapsible config
  const configToggle = document.getElementById('config-toggle');
  const configBody = document.getElementById('config-body');
  const configArrow = document.getElementById('config-arrow');
  if (configToggle) configToggle.addEventListener('click', () => {
    configBody.classList.toggle('open');
    configArrow.classList.toggle('open');
  });

  if (pauseBtn) pauseBtn.addEventListener('click', async () => { await ipcRenderer.invoke('pause-scheduler'); renderQueue(); });
  if (resumeBtn) resumeBtn.addEventListener('click', async () => { await ipcRenderer.invoke('resume-scheduler'); renderQueue(); });
  if (saveConfigBtn) saveConfigBtn.addEventListener('click', async () => {
    const start = parseInt(document.getElementById('wh-start').value) || 9;
    const end = parseInt(document.getElementById('wh-end').value) || 23;
    const budget = parseFloat(document.getElementById('budget-input').value) || 2;
    const blacklistStr = document.getElementById('blacklist-input').value || '';
    const blacklist = blacklistStr.split(',').map(s => s.trim()).filter(Boolean);
    const idleEnabled = document.getElementById('idle-enabled').checked;
    const idleMinutes = parseInt(document.getElementById('idle-minutes').value) || 15;
    const capacityEnabled = document.getElementById('capacity-enabled').checked;
    const capacityThreshold = parseInt(document.getElementById('capacity-threshold').value) || 50;
    await ipcRenderer.invoke('set-orchestrator-config', { workHours: { start, end }, dailyBudgetUsd: budget, blacklist, idleEnabled, idleMinutes, capacityEnabled, capacityThreshold });
    renderQueue();
  });
  if (addTaskBtn) addTaskBtn.addEventListener('click', () => showAddTaskDialog());

  // Wire remove buttons
  panelContent.querySelectorAll('[data-remove]').forEach(el => {
    el.addEventListener('click', async () => {
      await ipcRenderer.invoke('remove-from-queue', el.dataset.remove);
      renderQueue();
    });
  });
}

async function showAddTaskDialog() {
  const projects = await ipcRenderer.invoke('get-project-analysis');
  const skills = await ipcRenderer.invoke('get-skills');
  const entries = Object.entries(projects).sort((a, b) => a[0].localeCompare(b[0]));

  let html = '<div style="background:#1e1e2e;border:1px solid #2a2b3d;border-radius:8px;padding:14px;margin-bottom:10px;">';
  html += '<div style="font-size:12px;color:#c0caf5;font-weight:600;margin-bottom:8px;">Añadir tarea manual</div>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">';
  html += '<select id="add-project" style="background:#181825;border:1px solid #2a2b3d;color:#c0caf5;border-radius:4px;padding:4px 8px;font-size:11px;">';
  for (const [name] of entries) html += `<option value="${esc(name)}">${esc(name)}</option>`;
  html += '</select>';
  html += '<select id="add-skill" style="background:#181825;border:1px solid #2a2b3d;color:#c0caf5;border-radius:4px;padding:4px 8px;font-size:11px;">';
  for (const s of skills) html += `<option value="${esc(s.name)}">${esc(s.name)} ($${s.budgetUsd})</option>`;
  html += '</select>';
  html += '<button class="scan-btn" id="confirm-add-btn">Encolar</button>';
  html += '<button class="scan-btn" id="cancel-add-btn" style="color:#565f89;">Cancelar</button>';
  html += '</div></div>';

  panelContent.insertAdjacentHTML('afterbegin', html);

  document.getElementById('confirm-add-btn').addEventListener('click', async () => {
    const projName = document.getElementById('add-project').value;
    const skill = document.getElementById('add-skill').value;
    const proj = projects[projName];
    if (proj && skill) {
      await ipcRenderer.invoke('add-to-queue', { project: projName, skill, projectPath: proj.path });
      renderQueue();
    }
  });
  document.getElementById('cancel-add-btn').addEventListener('click', () => renderQueue());
}

let selectedSessionCwd = null;

async function renderLog() {
  let html = '';

  // Session selector (from active sessions)
  html += '<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">';
  html += '<span style="font-size:11px;color:#565f89;">Sesión:</span>';
  html += '<select id="log-session-select" style="background:#1e1e2e;border:1px solid #2a2b3d;color:#c0caf5;border-radius:4px;padding:4px 8px;font-size:11px;flex:1;">';
  html += '<option value="">— Seleccionar sesión —</option>';

  try {
    const sessions = await ipcRenderer.invoke('get-sessions');
    const seen = new Set();
    for (const s of sessions) {
      if (s.cwd && s.cwd !== 'N/A' && !seen.has(s.cwd)) {
        seen.add(s.cwd);
        const sel = s.cwd === selectedSessionCwd ? ' selected' : '';
        html += `<option value="${esc(s.cwd)}"${sel}>${esc(s.project || s.cwd)}</option>`;
      }
    }
  } catch {}

  html += '</select>';

  // Also show orchestrator execution log toggle
  html += '<button class="scan-btn" id="show-exec-log" style="font-size:10px;padding:2px 8px;">Historial auto</button>';
  html += '</div>';

  // Show conversation log if session selected
  if (selectedSessionCwd) {
    const entries = await ipcRenderer.invoke('get-session-log', selectedSessionCwd);
    if (!entries.length) {
      html += '<div class="empty-msg">No hay datos de conversación para esta sesión.</div>';
    } else {
      for (const entry of entries) {
        const typeColor = entry.type === 'user' ? '#7aa2f7' :
                          entry.type === 'assistant' ? '#9ece6a' : '#565f89';
        const typeLabel = entry.type === 'user' ? 'USER' :
                          entry.type === 'assistant' ? 'CLAUDE' : 'TOOL';
        html += `<div class="queue-item" style="align-items:flex-start;">`;
        html += `<span class="queue-status" style="background:${typeColor}22;color:${typeColor};min-width:50px;text-align:center;">${typeLabel}</span>`;
        html += `<span class="queue-info" style="font-size:11px;word-break:break-word;">${esc(entry.summary || '...')}</span>`;
        html += `</div>`;
      }
    }
  } else {
    html += '<div class="empty-msg">Selecciona una sesión activa para ver su log de conversación.</div>';
  }

  panelContent.innerHTML = html;

  // Wire session selector
  const sel = document.getElementById('log-session-select');
  if (sel) sel.addEventListener('change', (e) => { selectedSessionCwd = e.target.value || null; renderLog(); });

  // Wire execution log button
  const execBtn = document.getElementById('show-exec-log');
  if (execBtn) execBtn.addEventListener('click', () => renderExecLog());
}

async function renderExecLog() {
  const log = await ipcRenderer.invoke('get-execution-log');
  if (!log.length) {
    panelContent.innerHTML = `<div class="empty-msg">No hay ejecuciones autónomas registradas.</div>`;
    return;
  }
  let html = '<div style="font-size:12px;color:#c0caf5;font-weight:600;margin-bottom:8px;">Historial de ejecuciones autónomas</div>';
  for (const entry of log.reverse()) {
    const statusClass = entry.status === 'done' ? 'queue-done' : 'queue-failed';
    const time = entry.timestamp ? new Date(entry.timestamp).toLocaleString() : '?';
    html += `<div class="queue-item">`;
    html += `<span class="queue-status ${statusClass}">${esc(entry.status || '?')}</span>`;
    html += `<span class="queue-info">${esc(entry.project || '?')} — ${esc(entry.skill || '?')}`;
    if (entry.branch) html += ` <span style="color:#bb9af7;font-size:10px;">${esc(entry.branch)}</span>`;
    html += `</span>`;
    if (entry.costUsd) html += `<span class="queue-cost">$${entry.costUsd.toFixed(3)}</span>`;
    html += `<span class="queue-cost">${esc(time)}</span>`;
    html += `</div>`;
  }
  html += '<button class="scan-btn" style="margin-top:8px;" onclick="renderLog()">Volver</button>';
  panelContent.innerHTML = html;
}

async function renderStats() {
  let data, live;
  try { data = await ipcRenderer.invoke('get-dashboard-stats'); } catch { data = null; }
  try { live = await ipcRenderer.invoke('get-live-cycle'); } catch { live = null; }

  let html = '';

  // 1. Live cycle indicator
  html += '<div class="stats-section">';
  html += '<div class="stats-section-title">Ciclo 5h en vivo</div>';
  if (live) {
    const actionColors = { pace: '#9ece6a', accelerate: '#7aa2f7', burst: '#e0af68', coast: '#f7768e', wait: '#565f89' };
    const fillColor = actionColors[live.action] || '#565f89';
    html += `<div class="stats-cycle-track">`;
    html += `<div class="stats-cycle-fill" style="width:${live.usedPercent}%;background:${fillColor};"></div>`;
    html += `<div class="stats-cycle-target" style="left:${live.targetPercent}%;"></div>`;
    html += `<div class="stats-cycle-label">${live.usedPercent}% usado · Objetivo: ${live.targetPercent}% · ${live.remainingMin}m restantes · 7d: ${live.sevenDayPercent}%</div>`;
    html += `</div>`;
    // Show scheduler debug info
    try {
      const sched = await ipcRenderer.invoke('get-scheduler-status');
      const d = sched.lastTickDebug;
      const mode = sched.currentMode || 'ninguno';
      const paused = sched.paused ? ' (PAUSADO)' : '';
      const pending = sched.pendingTasks;
      let debugLine = `Modo: ${mode}${paused} · Tareas pendientes: ${pending}`;
      if (d) debugLine += ` · offHours: ${d.outsideHours} · idle: ${d.idle} · busy: ${d.busy} · pacing: ${d.pacingAction}`;
      if (d && d.reason) debugLine += ` · ${d.reason}`;
      html += `<div style="font-size:10px;color:#565f89;margin-top:4px;">${debugLine}</div>`;
    } catch {}
  } else {
    html += '<div style="font-size:11px;color:#565f89;">Sin datos de rate limit activos</div>';
  }
  html += '</div>';

  // 2. Token usage bar chart (last 20 cycles)
  html += '<div class="stats-section">';
  html += '<div class="stats-section-title">Uso por ciclo (últimos 20)</div>';
  if (data && data.cycleChart.length > 0) {
    const cycles = data.cycleChart;
    const chartH = 100;
    const barW = Math.floor(340 / Math.max(cycles.length, 1));
    const gap = 2;
    const svgW = cycles.length * barW;
    html += `<div class="stats-chart-wrap"><svg width="${svgW}" height="${chartH + 18}" viewBox="0 0 ${svgW} ${chartH + 18}">`;
    // Target line at 95%
    const targetY = chartH - (95 / 100 * chartH);
    html += `<line x1="0" y1="${targetY}" x2="${svgW}" y2="${targetY}" stroke="#e0af68" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>`;
    for (let i = 0; i < cycles.length; i++) {
      const pct = cycles[i].fiveHourPercent || 0;
      const h = pct / 100 * chartH;
      const x = i * barW + gap / 2;
      const w = barW - gap;
      const y = chartH - h;
      const date = cycles[i].capturedAt ? new Date(cycles[i].capturedAt).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }) : '';
      html += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="2" fill="#7aa2f7" opacity=".85"><title>${date}: ${pct}%</title></rect>`;
      if (cycles.length <= 20) {
        html += `<text x="${x + w / 2}" y="${chartH + 12}" text-anchor="middle" font-size="8" fill="#565f89">${date}</text>`;
      }
    }
    html += '</svg></div>';
  } else {
    html += '<div style="font-size:11px;color:#565f89;">Sin datos de ciclos aún</div>';
  }
  html += '</div>';

  // 3. Cost summary cards
  if (data) {
    html += '<div class="stats-section">';
    html += '<div class="stats-section-title">Costes</div>';
    html += '<div class="stats-grid">';
    html += `<div class="stats-card"><h3>Hoy</h3><div class="stats-value">$${data.costSummary.todayUsd.toFixed(2)}</div></div>`;
    html += `<div class="stats-card"><h3>Esta semana</h3><div class="stats-value">$${data.costSummary.weekUsd.toFixed(2)}</div><div class="stats-sub">${data.costSummary.weekRuns} ejecuciones</div></div>`;
    html += `<div class="stats-card"><h3>Este mes</h3><div class="stats-value">$${data.costSummary.monthUsd.toFixed(2)}</div><div class="stats-sub">${data.costSummary.monthRuns} ejecuciones</div></div>`;
    html += `<div class="stats-card"><h3>Ramas creadas</h3><div class="stats-value">${data.totalBranches}</div></div>`;
    html += '</div></div>';
  }

  // 4. Activity by skill
  if (data && Object.keys(data.activityBySkill).length > 0) {
    html += '<div class="stats-section">';
    html += '<div class="stats-section-title">Actividad por skill</div>';
    html += '<table class="stats-table"><tr><th>Skill</th><th>Total</th><th>OK</th><th>Error</th><th>Éxito</th></tr>';
    for (const [skill, s] of Object.entries(data.activityBySkill)) {
      const rate = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
      const rateColor = rate > 80 ? '#9ece6a' : rate > 50 ? '#e0af68' : '#f7768e';
      html += `<tr><td>${esc(skill)}</td><td>${s.total}</td><td>${s.done}</td><td>${s.failed}</td><td style="color:${rateColor};font-weight:600;">${rate}%</td></tr>`;
    }
    html += '</table></div>';
  }

  // 5. Project heatmap
  if (data && data.projectHeatmap.length > 0) {
    html += '<div class="stats-section">';
    html += '<div class="stats-section-title">Proyectos más atendidos</div>';
    const maxCount = data.projectHeatmap[0].count;
    for (const p of data.projectHeatmap) {
      const pct = maxCount > 0 ? (p.count / maxCount * 100) : 0;
      html += `<div class="stats-hbar-row">`;
      html += `<div class="stats-hbar-name" title="${esc(p.project)}">${esc(p.project)}</div>`;
      html += `<div class="stats-hbar-track"><div class="stats-hbar-fill" style="width:${pct}%;"></div></div>`;
      html += `<div class="stats-hbar-count">${p.count}</div>`;
      html += `</div>`;
    }
    html += '</div>';
  }

  if (!data || (data.cycleChart.length === 0 && Object.keys(data.activityBySkill).length === 0 && data.projectHeatmap.length === 0)) {
    html += '<div class="empty-msg">Sin datos históricos aún. Los datos se acumulan con las ejecuciones del orquestador.</div>';
  }

  panelContent.innerHTML = html;
}

function esc(str) { return String(str || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

// Live scheduler status updates
ipcRenderer.on('scheduler-status', (ev, status) => {
  if (currentTab === 'queue' && panel.classList.contains('open')) renderQueue();
  if (currentTab === 'stats' && panel.classList.contains('open')) renderStats();
});

// Show setup chip if hook is missing
ipcRenderer.on('hook-missing', () => {
  let sc = document.getElementById('setup-chip');
  if (sc) return;
  sc = document.createElement('div');
  sc.id = 'setup-chip';
  sc.className = 'chip setup';
  sc.innerHTML = `<div class="chip-main"><span class="name" style="color:#e0af68">Configurar hook</span></div>`;
  sc.title = 'Click para configurar el hook de Claude Code (necesario para detectar estados)';
  sc.addEventListener('click', async () => {
    sc.innerHTML = `<div class="chip-main"><span class="name" style="color:#e0af68">Configurando...</span></div>`;
    const ok = await ipcRenderer.invoke('run-setup-hook');
    if (ok) { sc.remove(); refresh(); }
    else { sc.innerHTML = `<div class="chip-main"><span class="name" style="color:#f7768e">Error al configurar</span></div>`; }
  });
  document.querySelector('.chips').prepend(sc);
});
